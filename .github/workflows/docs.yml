name: Docs

# Build API documentation with `cargo doc` and publish it to GitHub Pages.
# The crate is Windows-only (winheap links kernel32 + vendored libgit2), so
# docs must be built on a Windows runner; the Pages deployment itself runs on
# ubuntu where the official upload-pages-artifact / deploy-pages actions are
# best supported.
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one docs build/deploy at a time; cancel superseded runs.
concurrency:
  group: docs
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build docs (Windows x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable, MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          target: x86_64-pc-windows-msvc

      - name: Set up MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Build documentation
        run: cargo doc --no-deps --target x86_64-pc-windows-msvc

      - name: Add root redirect to crate docs
        shell: bash
        run: |
          DOC_DIR="target/x86_64-pc-windows-msvc/doc"
          # GitHub Pages serves from the repo root; redirect index to the
          # crate's own documentation directory.
          printf '<!DOCTYPE html><html><head><meta charset="utf-8"><meta http-equiv="refresh" content="0; url=biturbo/"><title>Biturbo docs</title></head><body>Redirecting to <a href="biturbo/">biturbo</a> API docs.</body></html>' > "$DOC_DIR/index.html"

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: target/x86_64-pc-windows-msvc/doc
          retention-days: 7

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download docs artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-site
          path: site

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
