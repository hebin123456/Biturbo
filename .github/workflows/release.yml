name: Release

# Pushing a `v*` tag triggers this single pipeline: build, test, verify, and
# publish a GitHub Release. CI is folded in here so the DLL is built only once
# per tag (previously CI and Release each built independently). Pushing to
# master does not trigger anything.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release-windows:
    name: Build + Test + Release (Windows x64, MSVC)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable, MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          target: x86_64-pc-windows-msvc

      - name: Set up MSVC dev environment (for dumpbin)
        uses: ilammy/msvc-dev-cmd@v1

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Derive version from tag
        id: ver
        shell: bash
        run: |
          # tag looks like v1.0.0 -> strip leading 'v'
          TAG="${GITHUB_REF_NAME#v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "Releasing version $TAG"

      - name: Sync Cargo.toml version with tag
        shell: bash
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          # Replace the first top-level `version = "..."` line (package version).
          # Allow an optional pre-release suffix so pre-release -> release works.
          sed -i -E "0,/^version = \"[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?\"$/s//version = \"$VERSION\"/" Cargo.toml
          grep -m1 -E '^version = ' Cargo.toml

      - name: Build release cdylib
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Smoke-test library unit tests
        # Only the lib unit-test harness is run (no integration tests).
        run: cargo test --lib --release --target x86_64-pc-windows-msvc

      - name: Verify build output (PE magic + size)
        shell: bash
        run: |
          set -e
          DLL="target/x86_64-pc-windows-msvc/release/biturbo.dll"
          test -f "$DLL" || { echo "biturbo.dll not found"; exit 1; }
          SIZE=$(wc -c < "$DLL")
          echo "Built: $DLL ($SIZE bytes)"
          # Sanity: first two bytes should be 'MZ' (PE/DLL magic).
          head -c 2 "$DLL" | od -An -c | grep -q 'M   Z' && echo "PE magic OK"

      - name: Verify symbol exports match biturbo.def
        shell: bash
        run: |
          python3 scripts/check_exports.py \
            target/x86_64-pc-windows-msvc/release/biturbo.dll \
            biturbo.def

      - name: Stage release artifacts
        shell: bash
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          STAGE="staging/biturbo-windows-x64-$VERSION"
          mkdir -p "$STAGE"
          cp "target/x86_64-pc-windows-msvc/release/biturbo.dll" "$STAGE/"
          cp biturbo.def "$STAGE/"
          # Import library / export table, if produced.
          cp "target/x86_64-pc-windows-msvc/release/biturbo.dll.lib" "$STAGE/" 2>/dev/null || true
          cp "target/x86_64-pc-windows-msvc/release/biturbo.dll.exp" "$STAGE/" 2>/dev/null || true
          (cd staging && 7z a -tzip "biturbo-windows-x64-$VERSION.zip" "biturbo-windows-x64-$VERSION")
          ls -la staging

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            staging/biturbo-windows-x64-*.zip
            staging/biturbo-windows-x64-*/biturbo.dll
            staging/biturbo-windows-x64-*/biturbo.def
