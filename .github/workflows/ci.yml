name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    name: Build (Windows x64, MSVC)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable, MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          target: x86_64-pc-windows-msvc

      - name: Set up MSVC dev environment (for dumpbin)
        uses: ilammy/msvc-dev-cmd@v1

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Build release cdylib
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Smoke-test library unit tests
        # Integration tests under tests/ require the original biturbo.dll
        # (not in this repo), so only the lib unit-test harness is run.
        run: cargo test --lib --release --target x86_64-pc-windows-msvc

      - name: Verify build output
        shell: bash
        run: |
          set -e
          DLL="target/x86_64-pc-windows-msvc/release/biturbo.dll"
          test -f "$DLL" || { echo "biturbo.dll not found"; exit 1; }
          SIZE=$(wc -c < "$DLL")
          echo "Built: $DLL ($SIZE bytes)"
          # Sanity: first two bytes should be 'MZ' (PE/DLL magic).
          head -c 2 "$DLL" | od -An -c | grep -q 'M   Z' && echo "PE magic OK"

      - name: Verify symbol exports match biturbo.def
        shell: bash
        run: |
          python3 scripts/check_exports.py \
            target/x86_64-pc-windows-msvc/release/biturbo.dll \
            biturbo.def

      - name: Upload biturbo.dll artifact
        uses: actions/upload-artifact@v4
        with:
          name: biturbo-windows-x64-ci
          path: |
            target/x86_64-pc-windows-msvc/release/biturbo.dll
            target/x86_64-pc-windows-msvc/release/biturbo.dll.lib
            biturbo.def
          if-no-files-found: error
