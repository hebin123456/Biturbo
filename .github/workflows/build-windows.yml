name: Build

# Pushing a `v*` tag (or a manual workflow_dispatch) triggers this single
# pipeline: build, test, verify, upload artifact, and on tag also publish a
# GitHub Release. CI is folded in here so the cdylib is built only once per
# tag per platform. Pushing to master does not trigger anything.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build + Test + Release (${{ matrix.os_name }} ${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64 (MSVC) — libgit2.dll zlib ABI 兼容（保留原版序号）
          - os: windows-latest
            os_name: windows
            arch: x64
            target: x86_64-pc-windows-msvc
            artifact_name: biturbo.dll
            archive_prefix: biturbo-windows-x64
            needs_msvc: true
          # Linux x64 — libbiturbo.so
          - os: ubuntu-latest
            os_name: linux
            arch: x64
            target: x86_64-unknown-linux-gnu
            artifact_name: libbiturbo.so
            archive_prefix: biturbo-linux-x64
            needs_msvc: false
          # macOS x64 — libbiturbo.dylib
          - os: macos-latest
            os_name: macos
            arch: x64
            target: x86_64-apple-darwin
            artifact_name: libbiturbo.dylib
            archive_prefix: biturbo-macos-x64
            needs_msvc: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}

      - name: Set up MSVC dev environment (for dumpbin)
        if: matrix.needs_msvc
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Linux build deps (cmake + llvm)
        if: matrix.os_name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config

      - name: Install macOS build deps (cmake)
        if: matrix.os_name == 'macos'
        run: brew install cmake ninja

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Derive version from tag
        id: ver
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          # tag looks like v1.0.0 -> strip leading 'v'
          TAG="${GITHUB_REF_NAME#v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "Releasing version $TAG"

      - name: Sync Cargo.toml version with tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          # Replace the first top-level `version = "..."` line (package version).
          # Allow an optional pre-release suffix so pre-release -> release works.
          sed -i -E "0,/^version = \"[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?\"$/s//version = \"$VERSION\"/" Cargo.toml
          grep -m1 -E '^version = ' Cargo.toml

      - name: Build release cdylib
        run: cargo build --release --target ${{ matrix.target }}

      - name: Run unit + integration tests
        # 既跑 lib 单元测试，也跑 tests/ 下的 FFI 集成测试。
        # 不带 --lib，cargo test 会自动包含集成测试。
        run: cargo test --release --target ${{ matrix.target }}

      - name: Verify build output exists
        shell: bash
        run: |
          set -e
          LIB="target/${{ matrix.target }}/release/${{ matrix.artifact_name }}"
          test -f "$LIB" || { echo "$LIB not found"; exit 1; }
          SIZE=$(wc -c < "$LIB")
          echo "Built: $LIB ($SIZE bytes)"

      - name: Verify PE magic (Windows only)
        if: matrix.os_name == 'windows'
        shell: bash
        run: |
          set -e
          DLL="target/${{ matrix.target }}/release/${{ matrix.artifact_name }}"
          # Sanity: first two bytes should be 'MZ' (PE/DLL magic).
          head -c 2 "$DLL" | od -An -c | grep -q 'M   Z' && echo "PE magic OK"

      - name: Verify symbol exports match biturbo.def
        shell: bash
        run: |
          python3 scripts/check_exports.py \
            "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" \
            biturbo.def

      - name: Stage release artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          STAGE="staging/${{ matrix.archive_prefix }}-$VERSION"
          mkdir -p "$STAGE"
          cp "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" "$STAGE/"
          cp biturbo.def "$STAGE/"
          # Windows 链接器产物（import library / export table），如存在则一并打包。
          if [ "${{ matrix.os_name }}" = "windows" ]; then
            cp "target/${{ matrix.target }}/release/biturbo.dll.lib" "$STAGE/" 2>/dev/null || true
            cp "target/${{ matrix.target }}/release/biturbo.dll.exp" "$STAGE/" 2>/dev/null || true
          fi
          (cd staging && 7z a -tzip "${{ matrix.archive_prefix }}-$VERSION.zip" "${{ matrix.archive_prefix }}-$VERSION")
          ls -la staging

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_prefix }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
          if-no-files-found: error

      - name: Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            staging/${{ matrix.archive_prefix }}-*/${{ matrix.artifact_name }}
            staging/${{ matrix.archive_prefix }}-*/biturbo.def
            staging/${{ matrix.archive_prefix }}-*.zip
